<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEKT4R.INK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        body {
            background: #050507;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- AURORA BACKGROUND --- */
        #aurora-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- FLOATING LETTERS --- */
        #float-letters {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .float-letter {
            position: absolute;
            font-weight: 900;
            font-size: 3rem;
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.06;
            animation: drift linear infinite;
            pointer-events: none;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(5deg); }
            50% { transform: translate(-20px, 30px) rotate(-3deg); }
            75% { transform: translate(15px, -15px) rotate(4deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- CUSTOM CURSOR --- */
        #c-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
            transform: translate(-50%, -50%);
        }
        #c-ring {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 1.5px solid #8b5cf6;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999998;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease-out;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }
        #c-ring.hover {
            width: 50px;
            height: 50px;
            border-color: #d946ef;
            box-shadow: 0 0 40px rgba(217, 70, 239, 0.3);
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 700px;
            margin: 0 auto 30px;
            position: relative;
            z-index: 10;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            font-weight: 900;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            cursor: none !important;
            user-select: none;
        }
        .version {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            background: #1a1a1a;
            color: #555;
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid #2a2a2a;
            user-select: none;
        }
        .support-btn {
            background: transparent;
            border: 1.5px solid #8b5cf6;
            color: #ddd;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.25s;
            cursor: none !important;
            position: relative;
            z-index: 20;
            animation: pulse-btn 2s ease-in-out infinite;
        }
        .support-btn:hover {
            background: rgba(139, 92, 246, 0.12);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
            color: #fff;
        }
        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 0 0 rgba(139, 92, 246, 0); }
            50% { box-shadow: 0 0 25px rgba(139, 92, 246, 0.2); }
        }

        /* --- CONTENT --- */
        .app {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 5;
        }

        .visual-core {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }
        .smiley {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            animation: float 4s infinite ease-in-out;
            z-index: 2;
            cursor: none !important;
            position: relative;
        }
        .smiley-tooltip {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            font-size: 0.8rem;
            color: #ccc;
            white-space: nowrap;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 10;
        }
        .smiley:hover .smiley-tooltip {
            opacity: 1;
        }
        .ring-bg {
            position: absolute;
            width: 180px;
            height: 180px;
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 30%;
            animation: spin 25s infinite linear;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* --- TITLE --- */
        .title-container {
            margin: 0 0 25px 0;
            text-align: center;
        }
        .title-text {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 4px;
            color: #bbb;
            text-transform: uppercase;
        }
        .title-text span {
            color: #8b5cf6;
        }
        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #8b5cf6;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- CARD WITH ONE IMAGE --- */
        .card {
            width: 100%;
            background: rgba(20, 20, 30, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            transition: box-shadow 0.3s;
        }
        .card.flash {
            animation: cardFlash 0.6s ease;
        }
        @keyframes cardFlash {
            0% { box-shadow: 0 0 0 rgba(139, 92, 246, 0); }
            30% { box-shadow: 0 0 80px rgba(139, 92, 246, 0.4), inset 0 0 40px rgba(139, 92, 246, 0.1); }
            100% { box-shadow: 0 0 0 rgba(139, 92, 246, 0); }
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 5px;
        }
        .card-label {
            font-size: 10px;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
        }
        .card-time {
            font-size: 10px;
            color: #666;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        /* One image */
        .main-image {
            width: 100%;
            border-radius: 16px;
            display: block;
            object-fit: cover;
            border: 1px solid rgba(139, 92, 246, 0.08);
            cursor: none !important;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(14px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
            cursor: none !important;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-card {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
            cursor: none !important;
        }
        .modal-card h2 {
            color: #eee;
            font-weight: 400;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }
        .modal-btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.05rem;
            border: none;
            transition: 0.2s;
            color: #fff;
            text-decoration: none;
            cursor: none !important;
        }
        .modal-btn.discord {
            background: #5865F2;
        }
        .modal-btn.discord:hover {
            background: #4752c4;
            transform: scale(1.02);
        }
        .modal-btn.telegram {
            background: #0088cc;
        }
        .modal-btn.telegram:hover {
            background: #0077b3;
            transform: scale(1.02);
        }
        .modal-close {
            margin-top: 24px;
            background: transparent;
            border: 1px solid #444;
            color: #999;
            padding: 8px 28px;
            border-radius: 40px;
            font-size: 0.9rem;
            transition: 0.2s;
            cursor: none !important;
        }
        .modal-close:hover {
            border-color: #8b5cf6;
            color: #eee;
        }

        /* --- TOAST --- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            backdrop-filter: blur(10px);
            padding: 14px 30px;
            border-radius: 60px;
            border: 1px solid #8b5cf6;
            color: #ddd;
            opacity: 0;
            transition: 0.4s ease;
            z-index: 99999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 500px) {
            .header { padding: 12px 18px; flex-wrap: wrap; gap: 10px; }
            .logo { font-size: 1.2rem; }
            .version { font-size: 0.7rem; padding: 2px 8px; }
            .support-btn { padding: 6px 16px; font-size: 0.8rem; }
            .title-text { font-size: 1.2rem; }
            .float-letter { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- AURORA CANVAS -->
    <canvas id="aurora-canvas"></canvas>

    <!-- FLOATING LETTERS -->
    <div id="float-letters"></div>

    <!-- CURSOR -->
    <div id="c-dot"></div>
    <div id="c-ring"></div>

    <!-- TOAST -->
    <div class="toast" id="toast">📋 copied: not.good.morning</div>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <span class="logo">NEKT4R.INK</span>
            <span class="version">v3.37</span>
        </div>
        <button class="support-btn" id="supportBtn">Support</button>
    </header>

    <!-- CONTENT -->
    <main class="app">
        <div class="visual-core">
            <div class="ring-bg"></div>
            <div class="smiley">
                <img src="assets/IMG_20260514_020558_919.jpg" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="Core">
                <div class="smiley-tooltip" id="tooltip">ты здесь</div>
            </div>
        </div>

        <div class="title-container">
            <span class="title-text" id="typedTitle"></span>
            <span class="cursor-blink" id="cursorBlink"></span>
        </div>

        <div class="card" id="card">
            <div class="card-header">
                <span class="card-label">Человек, который вас поддержит</span>
                <span class="card-time" id="timeCounter">00:00</span>
            </div>
            
            <!-- ONE IMAGE (все та же фотка) -->
            <img src="assets/IMG_20260514_020558_919.jpg" class="main-image" alt="Agent">
        </div>
    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="supportModal">
        <div class="modal-card">
            <h2>✦ connect ✦</h2>
            <div class="modal-btn-group">
                <button class="modal-btn discord" id="discordBtn">
                    <span>💬</span> Discord
                </button>
                <a href="https://t.me/sasibakas1" target="_blank" class="modal-btn telegram">
                    <span>✈️</span> Telegram
                </a>
            </div>
            <button class="modal-close" id="closeModalBtn">close</button>
        </div>
    </div>

    <script>
        (function() {
            // --- AURORA ---
            const canvas = document.getElementById('aurora-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;

            function resizeCanvas() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            const auroraParticles = [];
            const numParticles = 40;

            class AuroraParticle {
                constructor() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h * 0.6;
                    this.size = Math.random() * 80 + 40;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.1;
                    this.opacity = Math.random() * 0.08 + 0.02;
                    this.hue = Math.random() * 60 + 260;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < -this.size) this.x = w + this.size;
                    if (this.x > w + this.size) this.x = -this.size;
                    if (this.y < -this.size) this.y = h + this.size;
                    if (this.y > h + this.size) this.y = -this.size;
                }
                draw() {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                    gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${this.opacity})`);
                    gradient.addColorStop(0.5, `hsla(${this.hue + 20}, 80%, 60%, ${this.opacity * 0.5})`);
                    gradient.addColorStop(1, `hsla(${this.hue + 40}, 80%, 50%, 0)`);
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < numParticles; i++) {
                auroraParticles.push(new AuroraParticle());
            }

            function animateAurora() {
                ctx.clearRect(0, 0, w, h);
                auroraParticles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animateAurora);
            }
            animateAurora();

            // --- FLOATING LETTERS ---
            const lettersContainer = document.getElementById('float-letters');
            const letters = ['N', 'E', 'K', 'T', '4', 'R'];
            letters.forEach((letter, index) => {
                const el = document.createElement('div');
                el.className = 'float-letter';
                el.textContent = letter;
                el.style.left = (10 + Math.random() * 80) + '%';
                el.style.top = (10 + Math.random() * 80) + '%';
                el.style.fontSize = (2 + Math.random() * 3) + 'rem';
                el.style.animationDuration = (20 + Math.random() * 20) + 's';
                el.style.animationDelay = (index * 2 + Math.random() * 3) + 's';
                el.style.opacity = 0.04 + Math.random() * 0.04;
                lettersContainer.appendChild(el);
            });

            // --- CURSOR ---
            const dot = document.getElementById('c-dot');
            const ring = document.getElementById('c-ring');
            let mouseX = -100, mouseY = -100;
            let ringX = -100, ringY = -100;
            let ringActive = false;

            function updateCursor(e) {
                const x = e.clientX || e.touches?.[0]?.clientX || 0;
                const y = e.clientY || e.touches?.[0]?.clientY || 0;
                mouseX = x;
                mouseY = y;
                dot.style.left = x + 'px';
                dot.style.top = y + 'px';
                if (!ringActive) {
                    ring.style.left = x + 'px';
                    ring.style.top = y + 'px';
                    ringX = x;
                    ringY = y;
                    ringActive = true;
                }
                initAudio();
            }

            document.addEventListener('mousemove', updateCursor);
            document.addEventListener('touchmove', updateCursor, { passive: true });

            function animateRing() {
                if (!ringActive) {
                    ring.style.left = '-100px';
                    ring.style.top = '-100px';
                    requestAnimationFrame(animateRing);
                    return;
                }
                const dx = mouseX - ringX;
                const dy = mouseY - ringY;
                ringX += dx * 0.12;
                ringY += dy * 0.12;
                ring.style.left = ringX + 'px';
                ring.style.top = ringY + 'px';
                requestAnimationFrame(animateRing);
            }
            animateRing();

            document.addEventListener('mousedown', () => {
                ring.style.width = '20px';
                ring.style.height = '20px';
                ring.style.borderColor = '#d946ef';
                ring.style.boxShadow = '0 0 40px rgba(217, 70, 239, 0.4)';
            });
            document.addEventListener('mouseup', () => {
                ring.style.width = '30px';
                ring.style.height = '30px';
                ring.style.borderColor = '#8b5cf6';
                ring.style.boxShadow = '0 0 20px rgba(139, 92, 246, 0.15)';
            });

            document.querySelectorAll('.support-btn, .modal-btn, .modal-close, .logo, .smiley').forEach(el => {
                el.addEventListener('mouseenter', () => ring.classList.add('hover'));
                el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
            });

            // --- AUDIO & KEYBOARD SOUND ---
            let audioInitialized = false;
            let audioElement = null;

            function initAudio() {
                if (audioInitialized) return;
                audioInitialized = true;
                try {
                    audioElement = new Audio('https://stream.zeno.fm/0r0xa792kwzuv');
                    audioElement.loop = true;
                    audioElement.volume = 0.6;
                    audioElement.play().catch(() => {});
                } catch (e) {}
            }
            document.addEventListener('click', initAudio);

            function playKeySound() {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800 + Math.random() * 200, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.04);
                } catch (e) {}
            }
            document.addEventListener('click', playKeySound);

            // --- TYPING EFFECT ---
            const titleEl = document.getElementById('typedTitle');
            const cursorBlink = document.getElementById('cursorBlink');
            const fullText = 'We know when you <span>here.</span>';
            let charIndex = 0;

            function typeText() {
                if (charIndex <= fullText.length) {
                    titleEl.innerHTML = fullText.substring(0, charIndex);
                    charIndex++;
                    setTimeout(typeText, 50 + Math.random() * 30);
                } else {
                    cursorBlink.style.animation = 'blink 1s step-end infinite';
                }
            }
            setTimeout(typeText, 300);

            // --- TIME COUNTER ---
            const timeCounter = document.getElementById('timeCounter');
            let startTime = Date.now();

            function updateTime() {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const secs = String(elapsed % 60).padStart(2, '0');
                timeCounter.textContent = mins + ':' + secs;
                requestAnimationFrame(updateTime);
            }
            updateTime();

            // --- TOOLTIP JOKES ---
            const tooltip = document.getElementById('tooltip');
            const jokes = [
                "ты здесь",
                "погнали",
                "ой всё",
                "не спи",
                "семь пятниц",
                "ждун",
                "спокойной ночи",
                "доброе утро",
                "work hard, play hard",
                "минута тишины",
                "поехали",
                "держи в курсе",
                "как дела?",
                "ну ты это...",
                "зарядись",
                "не дрейфь",
                "всё будет норм",
                "на связи",
                "спи, я покараулю",
                "здесь тихо",
                "найди покой",
                "не парься",
                "всё под контролем",
                "улыбнись",
                "живи, кайфуй"
            ];
            tooltip.textContent = jokes[Math.floor(Math.random() * jokes.length)];

            // --- CARD FLASH ---
            const card = document.getElementById('card');
            card.addEventListener('click', () => {
                card.classList.remove('flash');
                void card.offsetWidth;
                card.classList.add('flash');
            });

            // --- MODAL ---
            const modal = document.getElementById('supportModal');
            const supportBtn = document.getElementById('supportBtn');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const discordBtn = document.getElementById('discordBtn');
            const toast = document.getElementById('toast');

            function openModal() {
                modal.classList.add('active');
                modal.style.cursor = 'none';
            }

            function closeModal() {
                modal.classList.remove('active');
            }

            supportBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openModal();
            });

            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });

            // --- DISCORD COPY ---
            discordBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const tag = 'not.good.morning';
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(tag).then(() => showToast());
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = tag;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast();
                }
            });

            function showToast() {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2400);
            }

            // --- PRELOAD IMAGES ---
            ['assets/IMG_20260514_020558_919.jpg'].forEach(src => {
                const img = new Image();
                img.src = src;
            });

        })();
    </script>
</body>
</html>
