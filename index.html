<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamicTitle">!?@&#%$^</title>
    <meta name="title" content="NEKT4R.INK">
    <meta name="description" content="nektar — космос, выбор, тишина. сайт о том, что внутри тебя.">
    <meta name="keywords" content="нектар, nektar, космос, выбор, цитаты, сайт, личный">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* светлый режим */
        body.light-mode {
            background: #f0f0f0;
            color: #0a0a0a;
        }
        body.light-mode .hero-subtitle,
        body.light-mode .hero-desc {
            color: #555;
        }
        body.light-mode .quote-section {
            border-color: rgba(0,0,0,0.1);
        }

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        body.light-mode #stars-canvas {
            opacity: 0.3;
        }

        #c-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
            transform: translate(-50%, -50%);
            transition: width 0.1s, height 0.1s;
        }
        #c-ring {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 1.5px solid #8b5cf6;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999998;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease-out;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
            will-change: transform;
        }
        #c-ring.hover {
            width: 50px;
            height: 50px;
            border-color: #d946ef;
            box-shadow: 0 0 40px rgba(217, 70, 239, 0.3);
        }

        #loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            transition: opacity 0.6s ease;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loader img {
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app {
            width: 100%;
            max-width: 1280px;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 5;
            display: none;
            transition: color 0.5s ease;
        }
        .app.visible {
            display: flex;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
            gap: 40px;
        }
        .hero-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .hero-tag {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #8b5cf6;
            text-transform: uppercase;
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 4px 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .animated-title {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-align: center;
            width: 100%;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(0.98); }
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .hero-desc {
            font-size: 1rem;
            color: #888;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .hero-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero-image {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(139, 92, 246, 0.1);
            animation: hologram 4s infinite alternate ease-in-out;
        }

        @keyframes hologram {
            0% { filter: hue-rotate(0deg) brightness(1); opacity: 1; }
            50% { filter: hue-rotate(10deg) brightness(1.1); opacity: 0.95; }
            100% { filter: hue-rotate(-10deg) brightness(0.9); opacity: 0.9; }
        }

        .quote-section {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 40px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .quote-section .quote {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            line-height: 1.5;
            transition: opacity 0.8s ease, transform 0.8s ease;
            position: relative;
        }
        .quote-section .quote:hover {
            color: #8b5cf6;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        /* переключатель режимов */
        .mode-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            background: rgba(20,20,30,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
            color: white;
        }
        .mode-toggle:hover {
            transform: scale(1.1);
            border-color: #8b5cf6;
        }
        body.light-mode .mode-toggle {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.1);
            color: #0a0a0a;
        }

        @media (max-width: 768px) {
            .app { padding: 30px 20px; }
            .hero { flex-direction: column; }
            .animated-title { font-size: 2.5rem; }
            .hero-right { width: 100%; }
            .mode-toggle { bottom: 20px; right: 20px; width: 44px; height: 44px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="assets/loading.png" alt="Loading">
    </div>

    <canvas id="stars-canvas"></canvas>

    <div id="c-dot"></div>
    <div id="c-ring"></div>

    <main class="app" id="mainContent">
        <section class="hero">
            <div class="hero-left">
                <div class="hero-tag">✦ добро пожаловать</div>
                <h1 class="animated-title" id="animatedTitle"></h1>
                <div class="hero-subtitle">этот сайт — твой выбор. каждый оттенок — это шаг к пониманию себя</div>
                <p class="hero-desc">
                    здесь нет правильных ответов. есть только ты и твой выбор. всё остальное — шум
                </p>
            </div>
            <div class="hero-right">
                <img src="assets/chief.jpg" class="hero-image" alt="Chief">
            </div>
        </section>

        <section class="quote-section" id="quoteContainer">
            <div class="quote" id="currentQuote"></div>
        </section>
    </main>

    <audio id="bg-music" loop>
        <source src="assets/ambient.mp3" type="audio/mpeg">
    </audio>

    <!-- Переключатель режимов -->
    <div class="mode-toggle" id="modeToggle">🌙</div>

    <script>
        (function() {
            const titleEl = document.getElementById('dynamicTitle');
            const titleSymbols = '!?@&#%$^';
            function animateTitle() {
                let newText = '';
                for (let i = 0; i < 7; i++) {
                    newText += titleSymbols[Math.floor(Math.random() * titleSymbols.length)];
                }
                titleEl.textContent = newText;
                setTimeout(animateTitle, 200);
            }
            animateTitle();

            const headerEl = document.getElementById('animatedTitle');
            const headerSymbols = '!?@&#%$^';
            function animateHeader() {
                let newText = '';
                for (let i = 0; i < 7; i++) {
                    newText += headerSymbols[Math.floor(Math.random() * headerSymbols.length)];
                }
                headerEl.textContent = newText;
                setTimeout(animateHeader, 200);
            }
            animateHeader();

            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            const stars = [];

            function resizeCanvas() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 1.5 + 0.5,
                    a: Math.random() * 0.8 + 0.2,
                    dx: (Math.random() - 0.5) * 0.3,
                    dy: (Math.random() - 0.5) * 0.3
                });
            }

            function drawStars() {
                ctx.clearRect(0, 0, w, h);
                stars.forEach(s => {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.a})`;
                    ctx.fill();
                    s.x += s.dx;
                    s.y += s.dy;
                    if (s.x < 0 || s.x > w) s.dx *= -1;
                    if (s.y < 0 || s.y > h) s.dy *= -1;
                });
                requestAnimationFrame(drawStars);
            }
            drawStars();

            const dot = document.getElementById('c-dot');
            const ring = document.getElementById('c-ring');
            let mouseX = -100, mouseY = -100;
            let ringX = -100, ringY = -100;
            let ringActive = false;

            function updateCursor(e) {
                const x = e.clientX || e.touches?.[0]?.clientX || 0;
                const y = e.clientY || e.touches?.[0]?.clientY || 0;
                mouseX = x;
                mouseY = y;
                dot.style.left = x + 'px';
                dot.style.top = y + 'px';
                if (!ringActive) {
                    ring.style.left = x + 'px';
                    ring.style.top = y + 'px';
                    ringX = x;
                    ringY = y;
                    ringActive = true;
                }
            }

            document.addEventListener('mousemove', updateCursor);
            document.addEventListener('touchmove', updateCursor, { passive: true });

            function animateRing() {
                if (!ringActive) return;
                const dx = mouseX - ringX;
                const dy = mouseY - ringY;
                ringX += dx * 0.12;
                ringY += dy * 0.12;
                ring.style.left = ringX + 'px';
                ring.style.top = ringY + 'px';
                requestAnimationFrame(animateRing);
            }
            animateRing();

            document.querySelectorAll('.logo').forEach(el => {
                el.addEventListener('mouseenter', () => ring.classList.add('hover'));
                el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
            });

            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('mainContent');
            const loadTime = Math.random() * 2500 + 1500;

            setTimeout(() => {
                loader.classList.add('hidden');
                mainContent.classList.add('visible');
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 600);
            }, loadTime);

            // звук при загрузке
            function playBootSound() {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                } catch (e) {}
            }

            setTimeout(playBootSound, loadTime + 200);

            const quotes = [
                'ты либо сгоришь, либо выйдешь из огня другим',
                'никто не скажет тебе, что делать. ты решаешь сам',
                'тишина здесь — это не пустота. это начало',
                'иногда лучший способ понять себя — просто заткнуться и посмотреть',
                'здесь нет правильных ответов. есть только ты и твой выбор',
                'покажи, что ты есть. остальное — не твоя забота',
                'ты не потерялся в космосе. ты наконец-то нашёл своё место',
                'не пытайся объяснить. просто почувствуй',
                'вселенная не терпит пустоты. но ты — не пустота',
                'ты — не статус. ты — причина, по которой этот сайт существует',
                'не бойся темноты. иногда именно в ней рождаются самые яркие цвета',
                'ты — не просто точка в бесконечности. ты — целая вселенная',
                'каждый цвет внутри тебя — это не просто оттенок. это голос',
                'космос начинается не за пределами земли. он начинается там, где ты позволяешь себе быть настоящим',
                'ты либо выйдешь из огня другим, либо сгоришь',
                'иногда лучший способ понять себя — просто заткнуться',
                'не ищи ответы. ищи вопросы',
                'ты — не ошибка. ты — эксперимент',
                'тишина громче слов',
                'не бойся быть собой. бойся быть никем',
                'всё, что тебе нужно, уже внутри тебя',
                'не жди, пока мир изменится. изменись сам',
                'иногда единственный способ выжить — это перестать бояться',
                'ты не один. даже когда кажется, что ты один',
                'не позволяй прошлому определять твоё будущее',
                'будь тем, кем ты хочешь быть, а не тем, кем тебя хотят видеть',
                'каждый день — это новый шанс',
                'не бойся ошибаться. бойся не пробовать',
                'ты — не твои ошибки',
                'всё начинается с выбора',
                'выбирай себя',
                'не жди идеального момента. создавай его',
                'ты сильнее, чем думаешь',
                'не сдавайся. ещё не всё потеряно',
                'каждый шаг — это прогресс',
                'ты — не твои мысли. ты — тот, кто их наблюдает',
                'иногда тишина — лучший ответ',
                'не бойся быть уязвимым. это делает тебя сильнее',
                'ты — не твои страхи. ты — тот, кто их преодолевает',
                'каждый конец — это новое начало',
                'не сравнивай себя с другими. сравнивай себя с собой вчерашним',
                'ты — не твои достижения. ты — твой путь',
                'не жди, пока кто-то спасёт тебя. спаси себя сам',
                'ты — не твои травмы. ты — твой опыт',
                'не бойся быть собой. даже если это значит быть другим',
                'ты — не твои сомнения. ты — твоя уверенность',
                'каждый день — это возможность стать лучше',
                'не бойся мечтать. бойся не мечтать',
                'ты — не твои границы. ты — твой потенциал'
            ];

            const quoteEl = document.getElementById('currentQuote');
            let currentIndex = Math.floor(Math.random() * quotes.length);

            function showQuote(index) {
                quoteEl.style.opacity = 0;
                quoteEl.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    quoteEl.textContent = quotes[index];
                    quoteEl.style.opacity = 1;
                    quoteEl.style.transform = 'translateY(0)';
                }, 400);
            }

            showQuote(currentIndex);
            setInterval(() => {
                currentIndex = (currentIndex + 1) % quotes.length;
                showQuote(currentIndex);
            }, 6000);

            // === глитч на картинке (3) ===
            function glitchImage() {
                const img = document.querySelector('.hero-image');
                if (!img) return;
                img.style.filter = 'hue-rotate(60deg) brightness(1.2) contrast(1.5)';
                img.style.transform = 'translate(2px, -2px) scale(1.02)';
                setTimeout(() => {
                    img.style.filter = '';
                    img.style.transform = '';
                }, 150);
            }

            setInterval(glitchImage, 15000);

            // === переключатель режимов (10) ===
            const toggle = document.getElementById('modeToggle');
            let isLightMode = false;

            toggle.addEventListener('click', () => {
                isLightMode = !isLightMode;
                document.body.classList.toggle('light-mode');
                toggle.textContent = isLightMode ? '☀️' : '🌙';
            });

            const audio = document.getElementById('bg-music');
            let audioPlayed = false;

            function unlockAndPlay() {
                if (audioPlayed) return;
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume().then(() => {
                            audio.play().then(() => {
                                audioPlayed = true;
                            }).catch(() => {});
                        });
                    } else {
                        audio.play().then(() => {
                            audioPlayed = true;
                        }).catch(() => {});
                    }
                } catch (e) {
                    audio.play().catch(() => {});
                }
            }

            setTimeout(unlockAndPlay, 500);

            document.addEventListener('click', unlockAndPlay, { once: true });
            document.addEventListener('mousemove', unlockAndPlay, { once: true });

        })();
    </script>
</body>
</html>
