<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEKT4R.INK | System</title>
    
    <style>
        :root {
            --bg: #050507;
            --purple: #8b5cf6;
            --pink: #d946ef;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
        }

        * { cursor: none !important; margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 50% -20%, #151030 0%, var(--bg) 85%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Кастомный курсор */
        #c-dot { width: 6px; height: 6px; background: white; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s; }
        #c-ring { width: 26px; height: 26px; border: 1px solid var(--purple); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: 0.15s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0.5; }

        /* Skeleton Loader */
        .skeleton { position: relative; overflow: hidden; background: #111 !important; border-radius: 20px; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Скрытие контента до загрузки */
        .content-hidden { opacity: 0; transition: 1s ease; }
        .loaded .content-hidden { opacity: 1; }
        .loaded .skeleton::after { display: none; }
        .loaded .skeleton { background: transparent !important; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 900; font-style: italic; font-size: 1.4rem;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        main { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }

        .visual-core { position: relative; width: 200px; height: 200px; margin-bottom: 50px; }
        .smiley { width: 120px; height: 120px; border-radius: 50%; position: relative; z-index: 5; animation: float 4s infinite ease-in-out; }
        .ring { position: absolute; border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 30%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: spin 20s infinite linear; }
        .ring.one { width: 160px; height: 160px; }
        
        .card {
            width: 100%; max-width: 400px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 30px; padding: 25px;
            backdrop-filter: blur(15px); box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .img-box img { width: 100%; border-radius: 20px; filter: brightness(0.8); transition: 0.5s; }
        .img-box img:hover { filter: brightness(1.1); transform: scale(1.02); }

        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.9); border: 1px solid var(--purple);
            padding: 12px 24px; border-radius: 12px; font-size: 13px; z-index: 10000;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #toast.show { top: 30px; }
    </style>
</head>
<body>

    <div id="c-dot"></div>
    <div id="c-ring"></div>
    <div id="toast">✅ Discord copied: not.good.morning</div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <header>
        <div class="logo">NEKT4R.INK</div>
        <div style="font-size: 10px; color: #333;">V3.37 // STABLE</div>
    </header>

    <main id="app">
        <div class="visual-core">
            <div class="ring one"></div>
            <img src="assets/IMG_20260514_020558_919.jpg" class="smiley" alt="Core">
        </div>

        <div class="card skeleton" id="main-card">
            <div class="content-hidden">
                <p style="text-align:center; font-size: 10px; letter-spacing: 4px; color: #555; margin-bottom: 20px;">SUPPORT AGENT</p>
                <div class="img-box" onclick="copyDS()">
                    <img src="assets/nektar.jpg" alt="Agent">
                </div>
            </div>
        </div>
    </main>

    <script>
        // Управление загрузкой
        setTimeout(() => {
            document.body.classList.add('loaded');
        }, 1500);

        // Курсор
        const dot = document.getElementById('c-dot');
        const ring = document.getElementById('c-ring');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            ring.style.left = (e.clientX - 13) + 'px';
            ring.style.top = (e.clientY - 13) + 'px';
        });

        // Звук и клик
        document.addEventListener('click', () => {
            const audio = document.getElementById('bg-audio');
            audio.volume = 0.1; // Тихий звук
            audio.play();
        }, { once: true });

        function copyDS() {
            navigator.clipboard.writeText('not.good.morning');
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
